<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | MedCare</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-box { width: 350px; padding: 40px; background: #fff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #2c7be5; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2c7be5; color: #fff; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .home-link { display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        <input type="text" id="adminUser" placeholder="Admin Username">
        <input type="password" id="adminPass" placeholder="Admin Password">
        <button onclick="adminLogin()">Login</button>
        <a href="index.html" class="home-link">← Back to Home</a>
    </div>

    <script>
       
function adminLogin() {
    const user = document.getElementById("adminUser").value;
    const pass = document.getElementById("adminPass").value;

    if (user === "admin" && pass === "admin123") {
        // This line connects to your 'admindashboard.html' file
        window.location.href = "admindashboard.html"; 
    } else {
        alert("Invalid Admin Credentials");
    }
}
</script>
</body>
</html>

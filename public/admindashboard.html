<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCare Pro | Unified Dashboard</title>
    <style>
        :root { --primary: #2c7be5; --success: #4caf50; --danger: #e74c3c; --bg: #f1f5f9; --dark: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #334155; }
        
        header { background: var(--dark); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items:center; }
        .nav-container { background: white; padding: 10px 0; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tabs button { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; background: #f8fafc; font-weight: 600; color: #64748b; transition: 0.2s; }
        .tabs button.active { background: var(--primary); color: white; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        section { display: none; animation: fadeIn 0.3s ease; }
        section.active { display: block; }
        
        /* Medicine Cards */
        .med-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
        .med-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .med-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .img-box { width: 100%; height: 180px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .med-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .med-info { padding: 15px; flex-grow: 1; border-top: 1px solid #f1f5f9; }
        .badge { font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        .badge-rx { background: #fee2e2; color: #ef4444; }
        .badge-otc { background: #f0fdf4; color: #16a34a; }

        /* Tables & Forms */
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; width: auto; padding: 6px 12px; font-size: 11px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1>🏥 MEDCARE SYSTEM</h1>
    <div id="roleIndicator" style="background:rgba(255,255,255,0.1); padding:5px 15px; border-radius:20px; font-size:14px;">Authority: Admin</div>
</header>

<nav class="nav-container">
    <div class="tabs">
        <button id="t-home" class="active" onclick="switchTab('home')">🏪 Storefront</button>
        <button id="t-users" onclick="switchTab('users')">👥 Manage Users</button>
        <button id="t-add-user" onclick="switchTab('add-user')">👤 Add New User</button>
        <button id="t-add-med" onclick="switchTab('add-med')">💊 Add Medicine</button>
    </div>
</nav>

<div class="container">
    <section id="home" class="active">
        <h2 style="margin-bottom:20px;">Medicine Inventory</h2>
        <div id="medicineGrid" class="med-grid"></div>
    </section>

    <section id="users">
        <div class="card">
            <h2>Current Authorized Users</h2>
            <table>
                <thead>
                    <tr><th>Name</th><th>Email</th><th>DOB</th><th>Role</th><th>Actions</th></tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </section>

    <section id="add-user">
        <div class="card" style="max-width: 500px; margin: auto;">
            <h2>Create User Account</h2>
            <form onsubmit="handleCreateUser(event)">
                <input type="text" id="uName" placeholder="Full Name" required>
                <input type="email" id="uEmail" placeholder="Email Address" required>
                <label style="font-size:12px; color:#666; padding-left:5px;">Date of Birth</label>
                <input type="date" id="uDob" required>
                <select id="uRole">
                    <option value="User">Standard User</option>
                    <option value="Admin">Administrator</option>
                </select>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
        </div>
    </section>

    <section id="add-med">
        <div class="card" style="max-width: 500px; margin: auto;">
            <h2>Register New Product</h2>
            <form onsubmit="handleCreateMed(event)">
                <input type="text" id="mName" placeholder="Medicine Name" required>
                <input type="text" id="mImg" placeholder="Image URL (Direct Link)" required>
                <input type="number" id="mPrice" placeholder="Price ($)" step="0.01" required>
                <div style="margin:10px 5px;">
                    <input type="checkbox" id="mRx"> <label for="mRx">Prescription Required</label>
                </div>
                <button type="submit" class="btn btn-primary">Add to Catalog</button>
            </form>
        </div>
    </section>
</div>

<script>
    // --- DATABASE ---
    let medicines = [
        {name: "Paracetamol 500mg", rx: false, price: 5.99, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Paracetamol_500mg_Tablets.jpg/640px-Paracetamol_500mg_Tablets.jpg"},
        {name: "Amoxicillin 250mg", rx: true, price: 15.50, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Amoxicillin_capsules.jpg/640px-Amoxicillin_capsules.jpg"},
        {name: "Ibuprofen (Advil)", rx: false, price: 8.25, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Ibuprofen_400mg.jpg/640px-Ibuprofen_400mg.jpg"},
        {name: "Aspirin 100mg", rx: false, price: 4.50, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Aspirin-Tablets.jpg/640px-Aspirin-Tablets.jpg"},
        {name: "Cetirizine (Allergy)", rx: false, price: 10.00, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Cetirizine_dihydrochloride_10_mg_tablets.JPG/640px-Cetirizine_dihydrochloride_10_mg_tablets.JPG"},
        {name: "Salbutamol Inhaler", rx: true, price: 35.00, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Salbutamol_inhaler.jpg/640px-Salbutamol_inhaler.jpg"}
    ];

    let users = [
        {name: "Admin Alpha", email: "admin@medcare.com", dob: "1985-06-15", role: "Admin"},
        {name: "Test Patient", email: "patient@web.com", dob: "1998-11-20", role: "User"}
    ];

    // --- CORE LOGIC ---
    function syncUI() {
        // Render Medicines
        const grid = document.getElementById('medicineGrid');
        grid.innerHTML = medicines.map(m => `
            <div class="med-card">
                <div class="img-box">
                    <img src="${m.img}" class="med-img" alt="${m.name}" onerror="this.src='https://via.placeholder.com/200x200?text=Image+Not+Found'">
                </div>
                <div class="med-info">
                    <span class="badge ${m.rx ? 'badge-rx' : 'badge-otc'}">${m.rx ? 'Rx' : 'OTC'}</span>
                    <h3 style="margin: 10px 0; font-size: 16px;">${m.name}</h3>
                    <div style="font-size: 1.3rem; color: var(--primary); font-weight: bold;">$${m.price.toFixed(2)}</div>
                    <button class="btn btn-primary" style="margin-top:10px; padding:8px;" onclick="alert('Proceeding to order ${m.name}')">Purchase</button>
                </div>
            </div>
        `).join('');

        // Render User Table
        const tableBody = document.getElementById('userTable');
        tableBody.innerHTML = users.map(u => `
            <tr>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>${u.dob}</td>
                <td><b style="color:${u.role === 'Admin' ? 'red' : 'green'}">${u.role}</b></td>
                <td><button class="btn btn-danger" onclick="deleteUser('${u.email}')">Revoke Access</button></td>
            </tr>
        `).join('');
    }

    function handleCreateUser(e) {
        e.preventDefault();
        users.push({
            name: document.getElementById('uName').value,
            email: document.getElementById('uEmail').value,
            dob: document.getElementById('uDob').value,
            role: document.getElementById('uRole').value
        });
        alert("✅ User Created Successfully");
        e.target.reset();
        syncUI();
        switchTab('users');
    }

    function handleCreateMed(e) {
        e.preventDefault();
        medicines.unshift({
            name: document.getElementById('mName').value,
            img: document.getElementById('mImg').value,
            price: parseFloat(document.getElementById('mPrice').value),
            rx: document.getElementById('mRx').checked
        });
        alert("✅ Medicine Added to Storefront");
        e.target.reset();
        syncUI();
        switchTab('home');
    }

    function deleteUser(email) {
        if(confirm(`Are you sure you want to remove access for ${email}?`)) {
            users = users.filter(u => u.email !== email);
            syncUI();
        }
    }

    function switchTab(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('t-'+id).classList.add('active');
    }

    window.onload = syncUI;
</script>

</body>
</html>

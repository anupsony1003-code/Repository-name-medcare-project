<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedCare | Registration</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef5ff; margin: 0; padding: 20px; }
        form { max-width: 750px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        h2 { text-align: center; color: #2c7be5; margin-bottom: 25px; }
        table { width: 100%; border-spacing: 0 10px; }
        td { padding: 5px; vertical-align: middle; }
        .label-cell { width: 160px; font-weight: 500; color: #333; }
        input[type="text"], input[type="password"], input[type="email"], input[type="date"], select { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; 
        }
        .btn-container { text-align: center; padding-top: 20px; }
        input[type="submit"] { background: #2c7be5; color: white; border: none; padding: 12px 50px; font-size: 16px; border-radius: 30px; cursor: pointer; }
        input[type="submit"]:hover { background: #1b5ec9; }
        .note { font-size: 12px; color: #777; width: 150px; padding-left: 15px; }
        .home-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #888; }
    </style>
</head>
<body>

<form id="regForm">
    <h2>Pharmacy Registration Form</h2>
    <table>
        <tr>
            <td class="label-cell">User ID</td>
            <td><input type="text" id="uid" required></td>
            <td class="note">5–12 characters</td>
        </tr>
        <tr>
            <td class="label-cell">Password</td>
            <td><input type="password" id="pwd" required></td>
            <td class="note">7–12 characters</td>
        </tr>
        <tr>
            <td class="label-cell">Full Name</td>
            <td><input type="text" id="name" required></td>
            <td class="note">Alphabets only</td>
        </tr>
        <tr>
            <td class="label-cell">Date of Birth</td>
            <td><input type="date" id="dob" required></td>
            <td class="note">Required</td>
        </tr>
        <tr>
            <td class="label-cell">Email</td>
            <td><input type="email" id="email" required></td>
            <td class="note">Valid format</td>
        </tr>
        <tr>
            <td class="label-cell">Contact Number</td>
            <td><input type="text" id="phone" maxlength="10" required></td>
            <td class="note">10 digits</td>
        </tr>
        <tr>
            <td class="label-cell">Address</td>
            <td><input type="text" id="address"></td>
            <td class="note">Street/House</td>
        </tr>
        <tr>
            <td class="label-cell">City</td>
            <td><input type="text" id="city"></td>
            <td class="note">Required</td>
        </tr>
        <tr>
            <td class="label-cell">Country</td>
            <td>
                <select id="country">
                    <option value="">Select Country</option>
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                </select>
            </td>
            <td class="note">Required</td>
        </tr>
    </table>

    <div class="btn-container">
        <input type="submit" value="Register Now">
    </div>
    <a href="login.html" class="home-link">Already have an account? Login</a>
</form>

<script>
document.getElementById("regForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    // 1. Collect Data
    const formData = {
        uid: document.getElementById("uid").value,
        password: document.getElementById("pwd").value,
        name: document.getElementById("name").value,
        date: document.getElementById("dob").value, // Matches 'date' in your service
        email: document.getElementById("email").value,
        phonenumber: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        city: document.getElementById("city").value,
        country: document.getElementById("country").value,
        role: "User" // Default role
    };

    // 2. Simple Client-side Validation
    if(formData.uid.length < 5) return alert("User ID too short");
    if(!/^\d{10}$/.test(formData.phonenumber)) return alert("Invalid Phone Number");

    try {
        // 3. Send to Backend
        const response = await fetch('http://localhost:5000/api/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (response.ok) {
            alert("✅ Registration Successful!");
            // Save token if returned
            if(result.token) localStorage.setItem("userToken", result.token);
            window.location.href = "login.html";
        } else {
            alert("❌ Error: " + result.message);
        }
    } catch (error) {
        console.error("Fetch error:", error);
        alert("Server is offline. Check your Node.js console.");
    }
});
</script>

</body>
</html>
